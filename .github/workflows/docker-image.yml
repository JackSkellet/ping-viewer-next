name: Publish BlueOS files

on:
  push:
    branches:
      - master
      - Ping-Viewer-Next_Discovery-Tweak
    paths:
      - "blueos-ping-viewer-next/**"
      - "scripts/generate_blueos_manifest.py"
      - "blueos-extension-repository/**"
      - ".github/workflows/action.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blueos-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: |
            curl
            git
            libwebkit2gtk-4.0-dev
            libwebkit2gtk-4.1-dev
            libappindicator3-dev
            librsvg2-dev
            patchelf

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set directory to safe for git
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install Rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain stable -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.30

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Check style
        run: cargo fmt --check

      - name: Check clippy
        run: cargo clippy --all-features

      - name: Build
        run: cargo build --verbose --locked

  build-frontend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ping-viewer-next-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bunx biome format

      - name: Lint check
        run: bunx biome lint

      - name: Build project
        run: bun run build

      - name: Upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ping-viewer-next-frontend/dist

  build-blueos-linux:
    needs: [quick-tests, build-frontend]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - TARGET: armv7-unknown-linux-musleabihf
            OUT: ping-viewer-next.armv7
          - TARGET: aarch64-unknown-linux-musl
            OUT: ping-viewer-next.aarch64
          - TARGET: x86_64-unknown-linux-musl
            OUT: ping-viewer-next.x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./ping-viewer-next-frontend/dist

      - name: Build target
        uses: houseabsolute/actions-rust-cross@v0.0.14
        with:
          target: ${{ matrix.TARGET }}
          args: "--release --locked --features 'embed-frontend blueos-extension'"

      - name: Prepare binary name
        run: |
          cp target/${{ matrix.TARGET }}/release/${{ github.event.repository.name }} ${{ matrix.OUT }}
          chmod +x ${{ matrix.OUT }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.OUT }}
          path: ${{ matrix.OUT }}

  deploy-blueos:
    needs: build-blueos-linux
    runs-on: ubuntu-22.04
    environment: DockerHub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create files directory
        run: mkdir -p ./blueos-ping-viewer-next/files/

      - name: Download armv7 binary
        uses: actions/download-artifact@v4
        with:
          name: ping-viewer-next.armv7
          path: ./blueos-ping-viewer-next/files/

      - name: Download aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: ping-viewer-next.aarch64
          path: ./blueos-ping-viewer-next/files/

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: ping-viewer-next.x86_64
          path: ./blueos-ping-viewer-next/files/

      - name: Deploy BlueOS Extension
        uses: BlueOS-community/Deploy-BlueOS-Extension@v1.2.0
        with:
          docker-username: ${{ secrets.DOCKERHUB_USERNAME }}
          docker-password: ${{ secrets.DOCKERHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-name: ping-viewer-next-discovery-tweak
          author: Raul Victor Trombin
          author-email: raulvtrombin@gmail.com
          maintainer: Blue Robotics
          maintainer-email: support@bluerobotics.com
          dockerfile-location: "./blueos-ping-viewer-next"
          skip-checkout: 'true'

  publish-blueos-manifest:
    needs: deploy-blueos
    if: ${{ needs.deploy-blueos.result == 'success' }}
    runs-on: ubuntu-22.04
    environment: DockerHub
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate BlueOS manifest
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python ./scripts/generate_blueos_manifest.py

      - name: Publish gh-pages content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/gh-pages
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages:refs/remotes/origin/gh-pages
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add -B gh-pages /tmp/gh-pages
          fi

          rm -rf /tmp/gh-pages/*
          cp /tmp/blueos-manifest/manifest.json /tmp/gh-pages/manifest.json
          mkdir -p /tmp/gh-pages/repos
          cp -R ./blueos-extension-repository/repos/. /tmp/gh-pages/repos/

          cd /tmp/gh-pages
          git add manifest.json repos
          git commit -m "Publish BlueOS manifest for ${GITHUB_REF_NAME}" || exit 0
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
